<div class="flex justify-center items-start py-24 bg-gray-50">
  <div class="max-w-3xl w-full bg-gray-100 shadow-lg rounded-lg p-8">
    <form (ngSubmit)="handleSubmit()" #registerForm="ngForm" class="space-y-12">

      <!-- Регистрация -->
      <div class="border-b border-gray-300 pb-8">
        <h2 class="text-xl font-bold text-gray-900">Регистрация</h2>

        <div class="mt-6 grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-2">
          <div class="sm:col-span-2">
            <label for="username" class="block text-sm font-medium text-gray-700">
              Потребителско име
            </label>
            <input
              id="username"
              name="username"
              type="text"
              [(ngModel)]="username"
              required
              class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700">
              Парола
            </label>
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="password"
              required
              class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
            />
          </div>

          <div>
            <label for="re-password" class="block text-sm font-medium text-gray-700">
              Повторете паролата
            </label>
            <input
              id="re-password"
              name="rePassword"
              type="password"
              [(ngModel)]="rePassword"
              required
              class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
            />
          </div>
        </div>
      </div>

      <!-- Лична информация -->
      <div class="border-b border-gray-300 pb-8">
        <h2 class="text-xl font-bold text-gray-900">Лична информация</h2>
        <p class="mt-1 text-sm text-gray-500">
          Използвайте личен имейл, на който да получавате информация за Вашите поръчки.
        </p>

        <div class="mt-6 grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-2">
          <div>
            <label for="first-name" class="block text-sm font-medium text-gray-700">
              Име
            </label>
            <input
              id="first-name"
              name="firstName"
              type="text"
              [(ngModel)]="firstName"
              class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
            />
          </div>

          <div>
            <label for="last-name" class="block text-sm font-medium text-gray-700">
              Фамилия
            </label>
            <input
              id="last-name"
              name="lastName"
              type="text"
              [(ngModel)]="lastName"
              class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
            />
          </div>

          <div class="sm:col-span-2 grid grid-cols-2 gap-4">
            <div>
              <label for="email" class="block text-sm font-medium text-gray-700">
                Email
              </label>
              <input
                id="email"
                name="email"
                type="email"
                [(ngModel)]="email"
                class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
              />
            </div>

            <div>
              <label for="phone" class="block text-sm font-medium text-gray-700">
                Телефон
              </label>
              <input
                id="phone"
                name="phone"
                type="tel"
                [(ngModel)]="phone"
                pattern="^\+359[0-9]{9}$"
                placeholder="+359888123456"
                class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
              />
              <p class="mt-1 text-xs text-gray-500">Формат: +359XXXXXXXXX</p>
            </div>
          </div>

          <div class="sm:col-span-2">
            <label for="street-address" class="block text-sm font-medium text-gray-700">
              Адрес за доставка
            </label>
            <input
              id="street-address"
              name="address"
              type="text"
              [(ngModel)]="address"
              class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
            />
          </div>

          <div>
            <label for="city" class="block text-sm font-medium text-gray-700">
              Град
            </label>
            <input
              id="city"
              name="city"
              type="text"
              [(ngModel)]="city"
              class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
            />
          </div>
        </div>
      </div>

      <!-- Бележки -->
      <div>
        <label for="notes" class="block text-sm font-medium text-gray-700">
          Бележки
        </label>
        <textarea
          id="notes"
          name="notes"
          rows="3"
          [(ngModel)]="notes"
          placeholder="Оставете инструкции и предпочитания към доставчика..."
          class="mt-2 block w-full rounded-md border border-gray-400 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm"
        ></textarea>
      </div>

      @if (error) {
        <p class="text-red-600 text-sm">{{ error }}</p>
      }

      <!-- Бутони -->
      <div class="mt-8 flex items-center justify-end gap-x-4">
        <button
          type="button"
          (click)="cancel()"
          class="rounded-md border border-gray-400 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"
        >
          Отмени
        </button>
        <button
          type="submit"
          class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500 focus:outline-none focus:ring-2 focus:ring-red-500"
        >
          Регистрирай се
        </button>
      </div>

    </form>
  </div>
</div>
