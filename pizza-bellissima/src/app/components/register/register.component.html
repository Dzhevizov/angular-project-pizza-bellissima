<div class="register">
  <div class="register__card">
    <form (ngSubmit)="handleSubmit()" #registerForm="ngForm" class="register__form">

      <!-- Регистрация -->
      <div class="register__section">
        <h2 class="register__section-title">Регистрация</h2>

        <div class="register__grid">
          <div class="register__field register__field--full">
            <label for="username" class="register__label">Потребителско име</label>
            <input
              id="username"
              name="username"
              type="text"
              [(ngModel)]="username"
              required
              class="register__input"
            />
          </div>

          <div class="register__field">
            <label for="password" class="register__label">Парола</label>
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="password"
              required
              class="register__input"
            />
          </div>

          <div class="register__field">
            <label for="re-password" class="register__label">Повторете паролата</label>
            <input
              id="re-password"
              name="rePassword"
              type="password"
              [(ngModel)]="rePassword"
              required
              class="register__input"
            />
          </div>
        </div>
      </div>

      <!-- Лична информация -->
      <div class="register__section">
        <h2 class="register__section-title">Лична информация</h2>
        <p class="register__section-subtitle">
          Използвайте личен имейл, на който да получавате информация за Вашите поръчки.
        </p>

        <div class="register__grid">
          <div class="register__field">
            <label for="first-name" class="register__label">Име</label>
            <input
              id="first-name"
              name="firstName"
              type="text"
              [(ngModel)]="firstName"
              class="register__input"
            />
          </div>

          <div class="register__field">
            <label for="last-name" class="register__label">Фамилия</label>
            <input
              id="last-name"
              name="lastName"
              type="text"
              [(ngModel)]="lastName"
              class="register__input"
            />
          </div>

          <div class="register__field">
            <label for="email" class="register__label">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              [(ngModel)]="email"
              class="register__input"
            />
          </div>

          <div class="register__field">
            <label for="phone" class="register__label">Телефон</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              [(ngModel)]="phone"
              pattern="^\+359[0-9]{9}$"
              placeholder="+359888123456"
              class="register__input"
            />
            <span class="register__hint">Формат: +359XXXXXXXXX</span>
          </div>

          <div class="register__field register__field--full">
            <label for="street-address" class="register__label">Адрес за доставка</label>
            <input
              id="street-address"
              name="address"
              type="text"
              [(ngModel)]="address"
              class="register__input"
            />
          </div>

          <div class="register__field">
            <label for="city" class="register__label">Град</label>
            <input
              id="city"
              name="city"
              type="text"
              [(ngModel)]="city"
              class="register__input"
            />
          </div>
        </div>
      </div>

      <!-- Бележки -->
      <div class="register__field">
        <label for="notes" class="register__label">Бележки</label>
        <textarea
          id="notes"
          name="notes"
          rows="3"
          [(ngModel)]="notes"
          placeholder="Оставете инструкции и предпочитания към доставчика..."
          class="register__textarea"
        ></textarea>
      </div>

      @if (error) {
        <p class="register__error">{{ error }}</p>
      }

      <!-- Бутони -->
      <div class="register__actions">
        <button type="button" (click)="cancel()" class="register__btn-cancel">
          Отмени
        </button>
        <button type="submit" class="register__btn-submit">
          Регистрирай се
        </button>
      </div>

    </form>
  </div>
</div>
