<div class="login">
  <div class="login__card">
    <h2 class="login__title">Вход в профила</h2>

    <form (ngSubmit)="handleSubmit()" #loginForm="ngForm" class="login__form">
      <div class="login__field">
        <label for="email" class="login__label">Имейл</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="Въведете имейл"
          [(ngModel)]="email"
          required
          class="login__input"
        />
      </div>

      <div class="login__field">
        <label for="password" class="login__label">Парола</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Въведете парола"
          [(ngModel)]="password"
          required
          class="login__input"
        />
      </div>

      @if (error) {
        <p class="login__error">{{ error }}</p>
      }

      <button type="submit" class="login__submit">Вход</button>
    </form>

    <div class="login__footer">
      <p>
        Нямате профил?
        <a routerLink="/register">Регистрирайте се</a>
      </p>
    </div>
  </div>
</div>
