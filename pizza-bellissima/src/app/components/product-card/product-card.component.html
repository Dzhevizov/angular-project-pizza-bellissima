<article class="product-card">
  <img [src]="product.image" [alt]="product.name" />
  <div class="product-card__body">
    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>

    <div class="product-card__meta">
      <span class="product-card__price">{{ product.price | number:'1.2-2' }} лв</span>
      <span class="product-card__discount" *ngIf="product.discount">
        -{{ product.discount }}%
      </span>
    </div>

    <button class="btn-primary" type="button">Добави в количката</button>
  </div>
</article>
