<article class="product-card">
  <a [routerLink]="['/product', product.id]" class="product-card__preview">
    <img [src]="product.image" [alt]="product.name" />
    <div class="product-card__body">
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
    </div>
  </a>

  <div class="product-card__meta">
    <span class="product-card__price">{{ toEur(product.price) }} € / {{ product.price | number:'1.2-2' }} лв</span>
    <span class="product-card__discount" *ngIf="product.discount">
      -{{ product.discount }}%
    </span>
  </div>

  <button class="btn-primary" type="button" (click)="addToCart()">Добави в количката</button>
</article>
