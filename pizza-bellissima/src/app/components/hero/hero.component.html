<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-inner">
    <div class="hero-content">
      <span class="hero-label">Pizza Bellissima</span>
      <div class="hero-copy">
        <h1>Топ вкусни пици и италианска храна на едно място</h1>
        <p>Избери от свежи пици, паста, ризото и десерти. Бърза доставка, лесно поръчване и специални предложения за всеки вкус.</p>
      </div>
      <div class="hero-actions">
        <a routerLink="/catalog" class="btn-primary">Виж менюто</a>
        <a routerLink="/login" class="btn-secondary" *ngIf="!authService.currentUser">Вход</a>
      </div>
    </div>

    <aside class="hero-aside">
      <div class="hero-aside-card">
        <img
          src="https://static.vecteezy.com/system/resources/previews/042/841/690/original/male-chef-holding-pizza-png.png"
          alt="Pizza chef welcoming customers"
        />
        <div class="hero-aside-body">
          <span>Добре дошли!</span>
          <p>Готвим с любов за Вас, сервирайки най-доброто от Италия.</p>
          <div class="hero-aside-motto">Бързо! Свежо! Вкусно!</div>
        </div>
      </div>
    </aside>
  </div>
</section>
